apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nkfilms-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nkfilms-deployment
  minReplicas: 2        # Always keep at least 2 pods running
  maxReplicas: 10       # Scale up to 10 under heavy traffic
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up if CPU > 70%
